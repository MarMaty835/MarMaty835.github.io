<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мои проекты</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* ===== ЗАГОЛОВОК ===== */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            color: #1a2634;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: #3b82f6;
        }

        .header p {
            font-size: 18px;
            color: #64748b;
            margin-top: 10px;
        }

        /* ===== СЕТКА КАРТОЧЕК ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        /* ===== КАРТОЧКА ПРОЕКТА ===== */
        .project-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 22px 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }

        /* Цветная полоска сверху */
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #3b82f6;
            border-radius: 20px 20px 0 0;
        }

        /* Разные цвета для проектов */
        .project-card:nth-child(1)::before {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }
        .project-card:nth-child(2)::before {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
        }
        .project-card:nth-child(3)::before {
            background: linear-gradient(90deg, #06b6d4, #22d3ee);
        }
        .project-card:nth-child(4)::before {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        /* Иконка / эмодзи проекта */
        .project-icon {
            font-size: 40px;
            margin-bottom: 16px;
            display: block;
        }

        /* Название проекта */
        .project-title {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        /* Описание */
        .project-description {
            font-size: 15px;
            line-height: 1.6;
            color: #475569;
            flex-grow: 1;
            margin-bottom: 18px;
        }

        /* Теги / метки */
        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .project-tags span {
            background: #f1f5f9;
            color: #334155;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        /* Кнопка "Подробнее" */
        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
            color: #3b82f6;
            text-decoration: none;
            transition: gap 0.2s ease, color 0.2s ease;
            margin-top: auto;
        }

        .project-link:hover {
            gap: 14px;
            color: #2563eb;
        }

        .project-link .arrow {
            transition: transform 0.2s ease;
            font-size: 18px;
        }

        .project-link:hover .arrow {
            transform: translateX(4px);
        }

        /* ===== АДАПТИВНОСТЬ ===== */

        /* Планшеты: 2 колонки */
        @media (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Телефоны: 1 колонка */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 30px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .project-card {
                padding: 22px 18px 26px;
            }
        }

        /* ===== АНИМАЦИЯ ПРИ ЗАГРУЗКЕ ===== */
        .project-card {
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .project-card:nth-child(1) {
            animation-delay: 0.05s;
        }
        .project-card:nth-child(2) {
            animation-delay: 0.15s;
        }
        .project-card:nth-child(3) {
            animation-delay: 0.25s;
        }
        .project-card:nth-child(4) {
            animation-delay: 0.35s;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== ПРИМЕР КАСТОМНОГО СКРОЛЛА ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ЗАГОЛОВОК -->
        <div class="header">
            <h1>Наши <span>проекты</span></h1>
            <p>Четыре направления, которые меняют мир к лучшему</p>
        </div>

        <!-- СЕТКА ПРОЕКТОВ -->
        <div class="projects-grid">

            <!-- ПРОЕКТ 1 -->
            <div class="project-card">
                <span class="project-icon">📐</span>
                <h2 class="project-title">Фрактал</h2>
                <a href="sum2026-main/fractal/dist" class="project-link">
                    Подробнее <span class="arrow">→</span>
                </a>
            </div>

            <!-- ПРОЕКТ 2 -->
            <div class="project-card">
                <span class="project-icon">🧊</span>
                <h2 class="project-title">3D</h2>
                <a href="sum2026-main/fractal_figure/dist" class="project-link">
                    Подробнее <span class="arrow">→</span>
                </a>
            </div>

            <!-- ПРОЕКТ 3 -->
            <div class="project-card">
                <span class="project-icon">📞</span>
                <h2 class="project-title">Месседжер</h2>
                <a href="#" class="project-link">
                    Подробнее <span class="arrow">→</span>
                </a>
            </div>

            <!-- ПРОЕКТ 4 -->
            <div class="project-card">
                <span class="project-icon">🗺️</span>
                <h2 class="project-title">Интерактивная карта</h2>
                <a href="#" class="project-link">
                    Подробнее <span class="arrow">→</span>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
